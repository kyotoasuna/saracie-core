name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            ext: .exe
          - goos: linux
            goarch: amd64
            ext: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
      - run: go test ./...
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist/saracie-${{ matrix.goos }}-${{ matrix.goarch }}
          go build -o dist/saracie-${{ matrix.goos }}-${{ matrix.goarch }}/saracied${{ matrix.ext }} ./cmd/saracied
          go build -o dist/saracie-${{ matrix.goos }}-${{ matrix.goarch }}/saracie-miner${{ matrix.ext }} ./cmd/saracie-miner
          go build -o dist/saracie-${{ matrix.goos }}-${{ matrix.goarch }}/saracie-wallet${{ matrix.ext }} ./cmd/saracie-wallet
          go build -o dist/saracie-${{ matrix.goos }}-${{ matrix.goarch }}/saracie-ui${{ matrix.ext }} ./cmd/saracie-ui
          cp -r scripts dist/saracie-${{ matrix.goos }}-${{ matrix.goarch }}/
          cp README.md QUICKSTART_WINDOWS.md MINING.md WALLET.md WALLET_SECURITY.md UI.md WHITEPAPER.md LICENSE dist/saracie-${{ matrix.goos }}-${{ matrix.goarch }}/
          if [ -f "RELEASE_NOTES_${{ github.ref_name }}.md" ]; then
            cp "RELEASE_NOTES_${{ github.ref_name }}.md" dist/saracie-${{ matrix.goos }}-${{ matrix.goarch }}/
          fi
      - name: Checksums
        run: |
          cd dist/saracie-${{ matrix.goos }}-${{ matrix.goarch }}
          find . -type f -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt
      - uses: actions/upload-artifact@v4
        with:
          name: saracie-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/saracie-${{ matrix.goos }}-${{ matrix.goarch }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Package
        run: |
          cd artifacts
          for dir in *; do
            zip -r "$dir.zip" "$dir"
          done
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
